<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detector de Billetes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}
.card-custom{
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}
video{
    width:100%;
    border-radius:15px;
}
.resultado{
    font-size:1.5rem;
    font-weight:bold;
}
.loader{
    display:none;
}
</style>
</head>

<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-lg-6 col-md-8 col-12">

<div class="card card-custom p-4 bg-white">

<h3 class="text-center text-primary">Detector de Billetes</h3>

<select id="corte" class="form-select text-center mb-3">
<option value="10">Bs 10</option>
<option value="20">Bs 20</option>
<option value="50" selected>Bs 50</option>
</select>

<!-- MANUAL -->
<div class="mb-3">
<input type="text" id="numeroManual" class="form-control text-center" placeholder="Ingresar número manual">
<button class="btn btn-success mt-2 w-100" onclick="consultarManual()">Verificar Manual</button>
</div>

<hr>

<!-- CAMARA -->
<video id="video" autoplay playsinline></video>

<button class="btn btn-secondary mt-2 w-100" onclick="cambiarCamara()">Cambiar Cámara</button>
<button class="btn btn-primary mt-2 w-100" onclick="capturar()">Escanear en Vivo</button>

<hr>

<!-- SUBIR -->
<input type="file" id="imagenInput" class="form-control" accept="image/*">
<button class="btn btn-warning mt-2 w-100" onclick="subirImagen()">Analizar Imagen</button>

<div class="text-center mt-3 loader" id="loader">
<div class="spinner-border text-primary"></div>
</div>

<div id="resultado" class="resultado mt-4 text-center"></div>

</div>
</div>
</div>
</div>

<script>
let video = document.getElementById("video");
let stream = null;
let devices = [];
let currentIndex = 0;

async function obtenerCamaras(){
    const all = await navigator.mediaDevices.enumerateDevices();
    devices = all.filter(d => d.kind === "videoinput");
}

async function iniciarCamara(index = 0){
    if(stream){
        stream.getTracks().forEach(track => track.stop());
    }

    const constraints = {
        video: devices[index]?.deviceId
            ? { deviceId: { exact: devices[index].deviceId } }
            : { facingMode: { ideal: "environment" } }
    };

    stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
}

async function cambiarCamara(){
    if(devices.length < 2){
        alert("Solo hay una cámara disponible");
        return;
    }
    currentIndex = (currentIndex + 1) % devices.length;
    await iniciarCamara(currentIndex);
}

async function capturar(){
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video,0,0);
    enviarAlServidor(canvas.toDataURL("image/jpeg"));
}

function subirImagen(){
    const file = document.getElementById("imagenInput").files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(e){
        enviarAlServidor(e.target.result);
    };
    reader.readAsDataURL(file);
}

function consultarManual(){
    const numero = document.getElementById("numeroManual").value;
    if(!numero) return;

    fetch("/procesar_manual",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            numero:numero,
            corte:document.getElementById("corte").value
        })
    })
    .then(res=>res.json())
    .then(data=>mostrarResultado(data));
}

function enviarAlServidor(imagen){
    document.getElementById("loader").style.display="block";

    fetch("/procesar",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            imagen:imagen,
            corte:document.getElementById("corte").value
        })
    })
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("loader").style.display="none";
        mostrarResultado(data);
    });
}

function mostrarResultado(data){
    const r = document.getElementById("resultado");

    if(data.resultado.includes("PROHIBIDO")){
        r.className="resultado mt-4 text-center text-danger";
    }else if(data.resultado.includes("VALIDO")){
        r.className="resultado mt-4 text-center text-success";
    }else{
        r.className="resultado mt-4 text-center text-warning";
    }

    r.innerText = data.resultado + " " + (data.numero || "");
}

async function init(){
    await obtenerCamaras();
    await iniciarCamara();
}

init();
</script>

</body>
</html>
